services:
  # Express Backend (Admin API) — PostgreSQL bilan
  - type: web
    name: admin-express-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: Admin/backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: admin-panel-db
          property: connectionString

databases:
  # Bepul PostgreSQL database (Render managed)
  - name: admin-panel-db
    plan: free
    region: frankfurt
    databaseName: admin_panel
    user: admin_user
