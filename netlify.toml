# Root netlify.toml — Admin Panel Frontend Deploy
# Bu fayl GitHub repo root'idan Netlify deploy qilganda ishlatiladi

[build]
  base = "Admin"
  publish = "dist"
  command = "npm install && npm run build"

# Node.js version
[build.environment]
  NODE_VERSION = "20"

# SPA uchun — MUHIM! Netlify link bilan /dashboard, /orders/new kabi routelarga
# kirganda 404 bo'lmasligi uchun
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
